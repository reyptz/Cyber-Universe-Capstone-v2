version: '3.8'

services:
  # Ghost Research Core Unified Service
  research-core:
    build: .
    container_name: ghost-research-core
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - MONGODB_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    volumes:
      - ./docs:/app/docs:ro
      - ./logs:/app/logs
      - ./chroma_db:/app/chroma_db
    depends_on:
      - mongodb
      - redis
      - elasticsearch
    networks:
      - ghost-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Database MongoDB
  mongodb:
    image: mongo:7.0
    container_name: ghost-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ghost-network
    restart: unless-stopped

  # Cache Redis
  redis:
    image: redis:7-alpine
    container_name: ghost-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ghost-network
    restart: unless-stopped

  # Search Engine Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: ghost-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - ghost-network
    restart: unless-stopped

  # Monitoring Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: ghost-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - ghost-network
    restart: unless-stopped

  # Dashboard Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: ghost-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - ghost-network
    restart: unless-stopped

networks:
  ghost-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  es_data:
