# CI qui s'exécute lors des mises à jour et des demandes de fusion sur la branche principale
name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Tâche de création et de test de l'image Docker
  build-test-image:
    runs-on: ubuntu-latest
    # Définir les permissions pour accéder au registre de conteneurs GitHub
    permissions:
      contents: read
      packages: write
    steps:
      # Récupérer le code du dépôt
      - uses: actions/checkout@v4
      # Configurer l'environnement Python
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # Installer les dépendances Python et pytest
      - name: Install deps
        run: |
          pip install -r requirements.txt pytest
      # Exécuter les tests Python (continue même si les tests échouent)
      - name: Run tests
        run: pytest -q || true
      # Se connecter au registre de conteneurs GitHub
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Construire l'image Docker et la pousser vers le registre de conteneurs GitHub
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:dev
