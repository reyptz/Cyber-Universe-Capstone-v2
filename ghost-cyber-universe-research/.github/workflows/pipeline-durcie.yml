name: Cloud DevSecOps

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io # Registre d'images conteneurisées GitHub
  IMAGE: ${{ github.repository }} # Nom de l'image basé sur le dépôt
  TAG: ${{ github.sha }} # Tag unique basé sur le commit SHA

permissions:
  contents: read # Lecture seule du code source
  packages: write # Écriture des packages/images
  id-token: write   # OIDC pour Cosign & SLSA - Authentification sans clé

jobs:
  # 1) Build hermétique + SBOM + Signature + Attestation
  build_sign_attest:
    runs-on: ubuntu-latest # Exécution sur runner Ubuntu
    steps:
      - uses: actions/checkout@v4 # Récupération du code source

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # Configuration du builder Docker

      - name: Login to GHCR
        uses: docker/login-action@v3 # Authentification au registre GitHub
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags/labels)
        id: meta # Extraction des métadonnées pour l'image
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ env.TAG }}
            type=raw,value=dev
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build & Push (provenance/SBOM embarquées)
        id: build # Construction et publication de l'image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true     # attestation minimaliste OCI
          sbom: true           # SBOM OCI attachée

      - name: Install Syft (SBOM fichier)
        run: | # Installation et génération SBOM avec Syft
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.TAG }} -o spdx-json=sbom.spdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3 # Installation de l'outil de signature

      - name: Sign image (Cosign keyless OIDC)
        env: { COSIGN_YES: "true" } # Signature de l'image sans clé via OIDC
        run: |
          cosign sign ${{ env.REGISTRY }}/${{ env.IMAGE }}@${{ steps.build.outputs.digest }}

      - name: Generate SLSA Provenance (attestation supply-chain)
        uses: slsa-framework/slsa-github-generator/actions/generator@v2 # Génération attestation SLSA
        with:
          upload-assets: true
          # l'attestation référencera l'artefact buildé par ce workflow

      - name: Upload SBOM file artifact
        uses: actions/upload-artifact@v4 # Sauvegarde du SBOM comme artéfact
        with:
          name: sbom-spdx
          path: sbom.spdx.json

  # 2) Scans minimum (échec si HIGH/CRITICAL)
  security_scans:
    runs-on: ubuntu-latest
    needs: [ build_sign_attest ] # Dépendance au job précédent
    steps:
      - uses: actions/checkout@v4

      - name: Trivy FS (SCA code + deps)
        uses: aquasecurity/trivy-action@0.24.0 # Scan des dépendances
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: table
          exit-code: "1"

      - name: Trivy Image (post-push)
        uses: aquasecurity/trivy-action@0.24.0 # Scan de l'image construite
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.TAG }}
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: table
          exit-code: "1"

  # 3) Déploiement protégé par approbations (environments)
  deploy_staging:
    runs-on: ubuntu-latest
    needs: [ build_sign_attest, security_scans ] # Dépendances aux jobs précédents
    environment: staging   # DOIT avoir des Required reviewers en Settings
    steps:
      - uses: actions/checkout@v4
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      - name: Verify image signature (pré-déploiement)
        run: | # Vérification signature avant déploiement
          cosign verify ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.TAG }} \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp="^https://github.com/${{ github.repository }}/.+" 
      - name: Deploy to Staging
        run: | # Déploiement en staging
          echo "kubectl apply -k k8s/overlays/staging"
          # kubectl apply -k k8s/overlays/staging

  promote_prod:
    runs-on: ubuntu-latest
    needs: [ deploy_staging ] # Dépendance au déploiement staging
    environment: production  # DOIT avoir des Required reviewers
    steps:
      - uses: actions/checkout@v4
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      - name: Verify image signature (prod gate)
        run: | # Vérification signature avant production
          cosign verify ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.TAG }} \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp="^https://github.com/${{ github.repository }}/.+" 
      - name: Deploy to Production
        run: | # Déploiement en production
          echo "kubectl apply -k k8s/overlays/production"
          # kubectl apply -k k8s/overlays/production
