# Pipeline CI/CD Sécurité
# Contenu : SAST (Semgrep), SCA (Trivy FS), Build & Push, SBOM (Syft), Signature (Cosign), Scan Image (Trivy), DAST (ZAP Baseline)

name: Security Pipeline

# Déclenché sur push et pull request sur la branche main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Variables d'environnement pour le registre d'images et le tag
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # 1) SAST + SCA (fail si vulnérabilités élevées)
  # Analyse statique du code source et des dépendances
  sast_sca:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      # SAST minimal avec Semgrep (règles CI génériques)
      # Analyse statique avec les règles de base
      - name: Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci
        env:
          SEMGREP_DISABLE_VERSION_CHECK: "1"

      # SCA (code + deps) — Trivy filesystem
      # Analyse des vulnérabilités dans les dépendances
      - name: Trivy FS (SCA)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: table
          exit-code: "1"

  # 2) Build, Push, SBOM, Signature (Cosign keyless via OIDC)
  # Construction et publication de l'image avec signature et SBOM
  build_sign_sbom:
    runs-on: ubuntu-latest
    needs: [sast_sca]
    permissions:
      contents: read
      packages: write
      id-token: write   # requis pour cosign keyless
    steps:
      - uses: actions/checkout@v4

      # Configuration de l'environnement Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Connexion au registre GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extraction des métadonnées pour les tags et labels
      - name: Extract metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=dev

      # Construction et publication de l'image Docker
      - name: Build & Push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Installation de l'outil Syft pour générer le SBOM
      - name: Install Syft (SBOM)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft version

      # Génération du SBOM au format SPDX
      - name: Generate SBOM (SPDX)
        run: |
          syft ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -o spdx-json=sbom.spdx.json

      # Installation de Cosign pour la signature
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # Signature de l'image sans clé via OIDC
      - name: Sign image with Cosign (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      # Sauvegarde du SBOM comme artefact
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  # 3) Scan de l'image poussée
  # Analyse de sécurité de l'image Docker publiée
  image_scan:
    runs-on: ubuntu-latest
    needs: [build_sign_sbom]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Trivy Image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: table
          exit-code: "1"

  # 4) DAST baseline très légère (lance l'app localement puis ZAP baseline)
  # Test de sécurité dynamique basique
  dast_baseline:
    runs-on: ubuntu-latest
    needs: [build_sign_sbom]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Démarrage local de l'API pour les tests
      - name: Start API locally
        run: |
          python -m pip install --upgrade pip
          # Adapte la ligne suivante si ton requirements est ailleurs
          pip install -r requirements.txt
          nohup python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -fsS http://localhost:8000/health && break || sleep 2
          done

      # Exécution du scan DAST avec ZAP
      - name: ZAP Baseline
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8000'
          cmd_options: '-a -m 5 -T 60'
