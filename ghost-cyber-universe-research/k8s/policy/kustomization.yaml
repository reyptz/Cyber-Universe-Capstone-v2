# Kustomization pour les politiques de sécurité
# Policy-as-Code avec OPA/Gatekeeper et gestion PKI

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: flask-app-policies
  annotations:
    config.kubernetes.io/local-config: "true"
    security.policy/enforcement: "strict"
    compliance.policy/framework: "cis-kubernetes"

# Namespace cible pour les politiques
namespace: gatekeeper-system

# Ressources de politiques de sécurité
resources:
  # Templates Gatekeeper
  - gatekeeper/templates/k8srequiresecuritycontext-template.yaml
  - gatekeeper/templates/k8sdenylatest-template.yaml
  - gatekeeper/templates/k8srequireimagesignature-template.yaml
  
  # Contraintes Gatekeeper
  - gatekeeper/constraints/gatekeeper-policies.yaml
  - gatekeeper/constraints/deny-latest.yaml
  - gatekeeper/constraints/require-securitycontext.yaml
  - gatekeeper/constraints/require-image-signature.yaml

# Labels communs pour toutes les politiques
commonLabels:
  app: gatekeeper
  component: policy-enforcement
  security.policy/type: "admission-control"

# Annotations communes
commonAnnotations:
  config.kubernetes.io/origin: "kustomize"
  security.policy/enforcement-mode: "enforce"
  compliance.policy/audit: "enabled"
  policy.open-policy-agent.org/policy-language: "rego"

# Configuration des images Gatekeeper
images:
  - name: gatekeeper
    newName: openpolicyagent/gatekeeper
    newTag: v3.14.0
  - name: gatekeeper-audit
    newName: openpolicyagent/gatekeeper
    newTag: v3.14.0

# Patches pour la configuration de sécurité
patchesStrategicMerge: []

# Configuration des replicas pour Gatekeeper
replicas:
  - name: gatekeeper-controller-manager
    count: 2
  - name: gatekeeper-audit
    count: 1

# Générateurs de configuration
configMapGenerator:
  - name: gatekeeper-config
    literals:
      - enforcement-mode=enforce
      - audit-interval=60s
      - violation-enforcement=deny
    options:
      disableNameSuffixHash: true

# Transformateurs pour la sécurité
transformers: []