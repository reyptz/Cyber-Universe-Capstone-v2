# Template Gatekeeper - Exigence de SecurityContext
# Valide que tous les pods ont un SecurityContext sécurisé

apiVersion: templates.gatekeeper.sh/v1beta1
kind: ConstraintTemplate
metadata:
  name: k8srequiresecuritycontext
  labels:
    policy.type: security
    compliance: cis-kubernetes
  annotations:
    description: "Exige un SecurityContext sécurisé pour tous les conteneurs"
    security.policy/context: "required-security-context"
spec:
  crd:
    spec:
      names:
        kind: K8sRequireSecurityContext
      validation:
        type: object
        properties:
          runAsNonRoot:
            type: boolean
            description: "Exiger runAsNonRoot: true"
          runAsUser:
            type: integer
            description: "UID utilisateur requis (> 0)"
          readOnlyRootFilesystem:
            type: boolean
            description: "Exiger readOnlyRootFilesystem: true"
          allowPrivilegeEscalation:
            type: boolean
            description: "Interdire allowPrivilegeEscalation"
          requiredDropCapabilities:
            type: array
            description: "Capabilities à supprimer obligatoirement"
            items:
              type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequiresecuritycontext
        
        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.securityContext
          msg := sprintf("Container %v manque de securityContext", [container.name])
        }
        
        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          input.parameters.runAsNonRoot == true
          not container.securityContext.runAsNonRoot == true
          msg := sprintf("Container %v doit avoir runAsNonRoot: true", [container.name])
        }
        
        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          input.parameters.runAsUser
          container.securityContext.runAsUser <= 0
          msg := sprintf("Container %v doit avoir runAsUser > 0", [container.name])
        }
        
        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          input.parameters.readOnlyRootFilesystem == true
          not container.securityContext.readOnlyRootFilesystem == true
          msg := sprintf("Container %v doit avoir readOnlyRootFilesystem: true", [container.name])
        }
        
        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          input.parameters.allowPrivilegeEscalation == false
          container.securityContext.allowPrivilegeEscalation == true
          msg := sprintf("Container %v ne doit pas avoir allowPrivilegeEscalation: true", [container.name])
        }
        
        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          required := input.parameters.requiredDropCapabilities[_]
          not required in container.securityContext.capabilities.drop
          msg := sprintf("Container %v doit supprimer la capability %v", [container.name, required])
        }
        
        # Validation pour les init containers
        violation[{"msg": msg}] {
          container := input.review.object.spec.initContainers[_]
          not container.securityContext
          msg := sprintf("Init container %v manque de securityContext", [container.name])
        }