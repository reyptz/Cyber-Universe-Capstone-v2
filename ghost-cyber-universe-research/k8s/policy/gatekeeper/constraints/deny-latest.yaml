# Template Gatekeeper - Interdiction du tag 'latest'
# Empêche l'utilisation du tag 'latest' pour les images de conteneurs

apiVersion: templates.gatekeeper.sh/v1beta1
kind: ConstraintTemplate
metadata:
  name: k8sdenylatest
  labels:
    policy.type: security
    compliance: cis-kubernetes
  annotations:
    description: "Interdit l'utilisation du tag 'latest' pour les images"
    security.policy/images: "no-latest-tag"
spec:
  crd:
    spec:
      names:
        kind: K8sDenyLatest
      validation:
        type: object
        properties:
          exemptImages:
            type: array
            description: "Images exemptées de cette politique"
            items:
              type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sdenylatest
        
        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          image := container.image
          has_latest_tag(image)
          not is_exempt(image)
          msg := sprintf("Image %v utilise le tag 'latest' qui est interdit", [image])
        }
        
        violation[{"msg": msg}] {
          container := input.review.object.spec.initContainers[_]
          image := container.image
          has_latest_tag(image)
          not is_exempt(image)
          msg := sprintf("Init container image %v utilise le tag 'latest' qui est interdit", [image])
        }
        
        has_latest_tag(image) {
          endswith(image, ":latest")
        }
        
        has_latest_tag(image) {
          not contains(image, ":")
        }
        
        is_exempt(image) {
          exempt := input.parameters.exemptImages[_]
          startswith(image, exempt)
        }