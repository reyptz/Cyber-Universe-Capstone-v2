# Template Gatekeeper - Exigence de signature d'images
# Valide que les images de conteneurs sont signées

apiVersion: templates.gatekeeper.sh/v1beta1
kind: ConstraintTemplate
metadata:
  name: k8srequireimagesignature
  labels:
    policy.type: security
    compliance: supply-chain-security
  annotations:
    description: "Exige que les images de conteneurs soient signées"
    security.policy/images: "signed-images-required"
spec:
  crd:
    spec:
      names:
        kind: K8sRequireImageSignature
      validation:
        type: object
        properties:
          trustedSigners:
            type: array
            description: "Liste des signataires de confiance"
            items:
              type: string
          exemptImages:
            type: array
            description: "Images exemptées de la vérification de signature"
            items:
              type: string
          signatureAnnotation:
            type: string
            description: "Annotation contenant la signature"
            default: "cosign.sigstore.dev/signature"
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequireimagesignature
        
        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          image := container.image
          not is_exempt(image)
          not has_valid_signature(image)
          msg := sprintf("Image %v n'a pas de signature valide", [image])
        }
        
        violation[{"msg": msg}] {
          container := input.review.object.spec.initContainers[_]
          image := container.image
          not is_exempt(image)
          not has_valid_signature(image)
          msg := sprintf("Init container image %v n'a pas de signature valide", [image])
        }
        
        has_valid_signature(image) {
          # Vérification basique - dans un environnement réel,
          # ceci serait intégré avec Cosign ou un autre outil de signature
          annotations := input.review.object.metadata.annotations
          signature_key := input.parameters.signatureAnnotation
          annotations[signature_key]
          
          # Vérifier que le signataire est de confiance
          signer := annotations["cosign.sigstore.dev/signer"]
          signer in input.parameters.trustedSigners
        }
        
        is_exempt(image) {
          exempt := input.parameters.exemptImages[_]
          startswith(image, exempt)
        }
        
        # Politique alternative pour les registres de confiance
        has_valid_signature(image) {
          # Images provenant de registres de confiance présumés signés
          trusted_registries := [
            "gcr.io/distroless/",
            "registry.k8s.io/",
            "quay.io/"
          ]
          
          registry := trusted_registries[_]
          startswith(image, registry)
        }