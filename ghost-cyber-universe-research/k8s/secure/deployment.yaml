# Deployment sécurisé pour l'application Flask
# Implémente les meilleures pratiques de sécurité Kubernetes
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: flask-app
  labels:
    app: flask-app
    version: v1
    security.level: hardened
spec:
  # Deux répliques pour la haute disponibilité
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
        version: v1
        security.level: hardened
      annotations:
        # Annotations pour le monitoring et la sécurité
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
    spec:
      # Service Account dédié avec permissions minimales
      serviceAccountName: flask-app-sa
      # Contexte de sécurité au niveau du pod
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: flask-app
        image: ghcr.io/ORG/flask-app:latest
        ports:
        - containerPort: 5000
          name: http
        - containerPort: 9090
          name: metrics
        # Contexte de sécurité strict du conteneur
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10001
          capabilities:
            drop: ["ALL"]
        # Limites de ressources strictes
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        # Probes de santé robustes
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        # Variables d'environnement sécurisées
        env:
        - name: FLASK_ENV
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        # Montage de volumes temporaires
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: var-run
          mountPath: /var/run
      # Volumes temporaires pour le filesystem read-only
      volumes:
      - name: tmp
        emptyDir: {}
      - name: var-run
        emptyDir: {}