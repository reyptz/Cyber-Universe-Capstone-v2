# Namespace sécurisé pour l'application Flask DevSecOps
# Inclut des labels pour les politiques de sécurité et la compliance
apiVersion: v1
kind: Namespace
metadata:
  name: flask-app
  labels:
    name: flask-app
    environment: production
    owner: devsecops-team
    # Labels pour les politiques de sécurité
    security.policy/enabled: "true"
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
  annotations:
    # Annotations pour la compliance et le monitoring
    security.compliance/framework: "nist-800-53"
    monitoring.prometheus.io/scrape: "true"
