# NetworkPolicies pour l'application Flask
# Implémente une stratégie de sécurité réseau "deny-all" par défaut

# Politique par défaut : tout refuser
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: flask-app
  labels:
    app: flask-app
  annotations:
    description: "Politique par défaut qui refuse tout le trafic"
spec:
  # Applique à tous les pods du namespace
  podSelector: {}
  # Refuse tout le trafic entrant et sortant
  policyTypes: ["Ingress", "Egress"]

---
# Politique : autoriser le trafic vers l'application Flask
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-flask-app
  namespace: flask-app
  labels:
    app: flask-app
  annotations:
    description: "Autorise le trafic entrant vers l'application Flask"
spec:
  # Applique uniquement aux pods de l'application Flask
  podSelector:
    matchLabels:
      app: flask-app
  policyTypes: ["Ingress"]
  ingress:
  # Autorise le trafic depuis le même namespace
  - from:
    - namespaceSelector:
        matchLabels:
          name: flask-app
    ports:
    - protocol: TCP
      port: 5000
  # Autorise le trafic depuis les ingress controllers (si nécessaire)
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 5000

---
# Politique : autoriser le trafic sortant de l'application
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-from-flask-app
  namespace: flask-app
  labels:
    app: flask-app
  annotations:
    description: "Autorise le trafic sortant nécessaire de l'application Flask"
spec:
  # Applique uniquement aux pods de l'application Flask
  podSelector:
    matchLabels:
      app: flask-app
  policyTypes: ["Egress"]
  egress:
  # Autorise les requêtes DNS
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Autorise les connexions HTTPS sortantes (APIs externes)
  - to: []
    ports:
    - protocol: TCP
      port: 443
  # Autorise les connexions HTTP sortantes (si nécessaire)
  - to: []
    ports:
    - protocol: TCP
      port: 80
