# Kustomization pour le déploiement sécurisé
# Organise les ressources Kubernetes avec sécurité renforcée
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Métadonnées du déploiement
metadata:
  name: flask-app-secure
  annotations:
    description: "Configuration sécurisée pour l'application Flask"

# Namespace cible
namespace: flask-app

# Liste des ressources à déployer
resources:
  - namespace.yaml
  - rbac.yaml
  - deployment.yaml
  - networkpolicy.yaml

# Labels communs appliqués à toutes les ressources
commonLabels:
  app: flask-app
  environment: secure
  security.level: hardened
  managed-by: kustomize

# Annotations communes pour la sécurité
commonAnnotations:
  security.compliance/framework: "nist-800-53"
  security.scan/last-updated: "2024-01-15"

# Images à utiliser avec tags sécurisés
images:
  - name: ghcr.io/ORG/flask-app
    newTag: v1.0.0-secure

# Patches pour renforcer la sécurité (optionnel)
# patchesStrategicMerge:
#   - security-patches.yaml