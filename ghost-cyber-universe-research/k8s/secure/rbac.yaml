# Configuration RBAC pour l'application Flask
# Implémente le principe du moindre privilège

# Service Account dédié pour l'application
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flask-app-sa
  namespace: flask-app
  labels:
    app: flask-app
  annotations:
    description: "Service Account pour l'application Flask avec permissions minimales"

---
# Rôle avec permissions minimales
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flask-app-role
  namespace: flask-app
  labels:
    app: flask-app
rules:
  # Permission de lecture des ConfigMaps pour la configuration
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  # Permission de lecture des Secrets (si nécessaire)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    # Limiter aux secrets spécifiques si possible
    resourceNames: ["flask-app-config"]

---
# Liaison du rôle au Service Account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flask-app-rolebinding
  namespace: flask-app
  labels:
    app: flask-app
subjects:
- kind: ServiceAccount
  name: flask-app-sa
  namespace: flask-app
roleRef:
  kind: Role
  name: flask-app-role
  apiGroup: rbac.authorization.k8s.io