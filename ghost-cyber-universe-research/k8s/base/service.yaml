# Service pour exposer l'application Flask
# Expose le port 5000 de l'application sur le port 80
apiVersion: v1
kind: Service
metadata:
  name: flask-app-service
  namespace: flask-app
  labels:
    app: flask-app
spec:
  # Sélecteur pour cibler les pods de l'application
  selector:
    app: flask-app
  ports:
    - name: http
      port: 80          # Port exposé par le service
      targetPort: 5000  # Port du conteneur
      protocol: TCP
  # Type ClusterIP pour un accès interne uniquement
  type: ClusterIP