# Kustomization pour le déploiement de base
# Organise les ressources Kubernetes de manière simple
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Métadonnées du déploiement
metadata:
  name: flask-app-base
  annotations:
    description: "Configuration de base pour l'application Flask"

# Namespace cible
namespace: flask-app

# Liste des ressources à déployer
resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml

# Labels communs appliqués à toutes les ressources
commonLabels:
  app: flask-app
  environment: base
  managed-by: kustomize

# Préfixe pour les noms des ressources (optionnel)
# namePrefix: base-

# Images à utiliser (permet de surcharger facilement)
images:
  - name: ghcr.io/ORG/flask-app
    newTag: latest