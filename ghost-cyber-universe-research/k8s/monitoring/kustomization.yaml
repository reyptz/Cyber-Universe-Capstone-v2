# Kustomization pour le monitoring minimal
# Observabilité essentielle avec métriques et logs
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Métadonnées
metadata:
  name: flask-app-monitoring
  annotations:
    description: "Configuration de monitoring minimaliste"

# Namespace cible
namespace: flask-app

# Ressources de monitoring
resources:
  - rbac.yaml
  - servicemonitor.yaml
  - logging.yaml
  - alerts.yaml

# Labels communs
commonLabels:
  monitoring.stack: minimal
  app.kubernetes.io/part-of: flask-app

# Annotations communes
commonAnnotations:
  monitoring.scope: "essential-metrics-only"
  observability.level: "minimal"