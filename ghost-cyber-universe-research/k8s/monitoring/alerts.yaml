# Alertes Prometheus minimales
# Règles d'alerte pour les métriques critiques uniquement
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: flask-app-alerts
  namespace: flask-app
  labels:
    app: flask-app
    monitoring: prometheus
spec:
  groups:
  - name: flask-app.rules
    interval: 30s
    rules:
    
    # Alerte: Application indisponible
    - alert: FlaskAppDown
      expr: up{job="flask-app-metrics"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Application Flask indisponible"
        description: "L'application Flask n'est pas accessible depuis {{ $labels.instance }}"
    
    # Alerte: Taux d'erreur élevé
    - alert: FlaskHighErrorRate
      expr: |
        (
          rate(flask_http_requests_total{status=~"5.."}[5m]) /
          rate(flask_http_requests_total[5m])
        ) * 100 > 5
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "Taux d'erreur élevé sur Flask"
        description: "Taux d'erreur 5xx: {{ $value }}% sur {{ $labels.instance }}"
    
    # Alerte: Latence élevée
    - alert: FlaskHighLatency
      expr: |
        histogram_quantile(0.95,
          rate(flask_http_request_duration_seconds_bucket[5m])
        ) > 1
      for: 3m
      labels:
        severity: warning
      annotations:
        summary: "Latence élevée sur Flask"
        description: "P95 latence: {{ $value }}s sur {{ $labels.instance }}"
    
    # Alerte: Utilisation mémoire élevée
    - alert: FlaskHighMemoryUsage
      expr: |
        (process_resident_memory_bytes / (256 * 1024 * 1024)) * 100 > 80
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Utilisation mémoire élevée"
        description: "Mémoire utilisée: {{ $value }}% sur {{ $labels.instance }}"