# ServiceMonitor pour Prometheus - Configuration minimale
# Collecte les métriques essentielles de l'application Flask
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: flask-app-metrics
  namespace: flask-app
  labels:
    app: flask-app
    monitoring: prometheus
spec:
  # Sélectionne le service à monitorer
  selector:
    matchLabels:
      app: flask-app
  # Configuration des endpoints de métriques
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    # Métriques essentielles uniquement
    metricRelabelings:
    - sourceLabels: [__name__]
      regex: '(flask_http_request_duration_seconds|flask_http_requests_total|process_resident_memory_bytes|process_cpu_seconds_total)'
      action: keep

---
# Service dédié pour les métriques
apiVersion: v1
kind: Service
metadata:
  name: flask-app-metrics
  namespace: flask-app
  labels:
    app: flask-app
    monitoring: prometheus
spec:
  selector:
    app: flask-app
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  type: ClusterIP