# Multi-Stage CI/CD Pipeline
# Platform Engineer - Multi-language builds, shared libs, internal platform

name: Ghost Cyber Universe - Multi-Stage Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Stage 1: Build all language components
  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [core-c, services-rust, brain-python, ui-react]
        include:
          - component: core-c
            language: c
            build-file: CMakeLists.txt
            artifact: libghost.so
          - component: services-rust
            language: rust
            build-file: Cargo.toml
            artifact: ghost-services
          - component: brain-python
            language: python
            build-file: pyproject.toml
            artifact: brain-api
          - component: ui-react
            language: typescript
            build-file: package.json
            artifact: ui-dist

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          language: ${{ matrix.language }}

      - name: Build ${{ matrix.component }}
        run: |
          case "${{ matrix.language }}" in
            c)
              mkdir build && cd build
              cmake .. -DCMAKE_BUILD_TYPE=Release
              make -j$(nproc)
              ;;
            rust)
              cargo build --release
              ;;
            python)
              poetry install
              poetry build
              ;;
            typescript)
              npm ci
              npm run build
              ;;
          esac

      - name: Run unit tests
        run: |
          case "${{ matrix.language }}" in
            c)
              cd build && ctest --output-on-failure
              ;;
            rust)
              cargo test --release
              ;;
            python)
              poetry run pytest --cov=brain --cov-report=xml
              ;;
            typescript)
              npm test -- --coverage --watchAll=false
              ;;
          esac

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.component }}-build
          path: |
            build/${{ matrix.artifact }}
            target/release/${{ matrix.artifact }}
            dist/
            coverage.xml

  # Stage 2: Security scanning
  security-scan:
    runs-on: ubuntu-latest
    needs: build-matrix
    strategy:
      matrix:
        component: [core-c, services-rust, brain-python, ui-react]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.component }}-build
          path: ./artifacts

      - name: SAST Scan
        uses: ./.github/actions/sast-scan
        with:
          language: ${{ matrix.language }}
          path: ./

      - name: Dependency Scan
        uses: ./.github/actions/dependency-scan
        with:
          language: ${{ matrix.language }}

      - name: Container Security Scan
        if: matrix.component != 'ui-react'
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}:${{ github.sha }} .
          trivy image --format sarif --output trivy-results.sarif ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}:${{ github.sha }}

      - name: Upload security results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # Stage 3: Integration testing
  integration-test:
    runs-on: ubuntu-latest
    needs: [build-matrix, security-scan]
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-build"
          path: ./artifacts

      - name: Setup test environment
        run: |
          # Install shared libraries
          sudo apt-get update
          sudo apt-get install -y libffi-dev libssl-dev

          # Setup Python environment
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio httpx

      - name: Run integration tests
        run: |
          # Start services in background
          ./artifacts/brain-api/brain-api &
          sleep 10

          # Run integration test suite
          pytest tests/integration/ -v --tb=short

      - name: Performance benchmarks
        run: |
          # Benchmark C-Rust FFI
          python tests/benchmarks/ffi_performance.py

          # Benchmark API response times
          python tests/benchmarks/api_performance.py

          # Benchmark eBPF latency
          python tests/benchmarks/ebpf_performance.py

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.json

  # Stage 4: Container build and push
  build-and-push:
    runs-on: ubuntu-latest
    needs: [build-matrix, security-scan, integration-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-build"
          path: ./artifacts

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          # Build multi-stage Dockerfile
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            --build-arg VCS_REF=${{ github.sha }} \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --push \
            .

      - name: Generate SBOM
        run: |
          # Generate CycloneDX SBOM
          docker sbom ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --format cyclonedx-json \
            --output sbom.json

      - name: Sign with Sigstore
        run: |
          # Sign container image
          cosign sign \
            --key ${{ secrets.SIGSTORE_PRIVATE_KEY }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  # Stage 5: Deployment (staging only)
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Deploy to staging
        run: |
          # Deploy to staging environment
          helm upgrade --install ghost-cyber-universe-staging \
            ./helm/ghost-cyber-universe \
            --namespace staging \
            --set image.tag=${{ github.sha }} \
            --set environment=staging

      - name: Run smoke tests
        run: |
          # Wait for deployment
          kubectl wait --for=condition=ready pod -l app=ghost-cyber-universe -n staging --timeout=300s

          # Run smoke tests
          python tests/smoke/staging_tests.py

  # Stage 6: Production deployment (manual approval)
  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy to production
        run: |
          # Deploy with rolling update
          helm upgrade --install ghost-cyber-universe \
            ./helm/ghost-cyber-universe \
            --namespace production \
            --set image.tag=${{ github.sha }} \
            --set environment=production \
            --set replicaCount=3

      - name: Verify deployment
        run: |
          # Health check
          kubectl wait --for=condition=ready pod -l app=ghost-cyber-universe -n production --timeout=600s

          # Run production smoke tests
          python tests/smoke/production_tests.py

      - name: Notify teams
        if: success()
        run: |
          # Send deployment notification
          curl -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"Ghost Cyber Universe v${{ github.sha }} deployed to production\"}"
