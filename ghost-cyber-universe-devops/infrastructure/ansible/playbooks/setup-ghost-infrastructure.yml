# Ghost Cyber Universe - Ansible Playbooks
# DevOps Role - Infrastructure Automation

---
- name: Setup Ghost Cyber Universe Infrastructure
  hosts: all
  become: true
  vars:
    ghost_user: ghost
    ghost_group: ghost
    ghost_home: /opt/ghost-cyber-universe
    docker_compose_version: "v2.20.2"
    kubernetes_version: "1.28.2"
    
  tasks:
    - name: Update system packages
      package:
        name: "*"
        state: latest
      when: ansible_os_family == "RedHat"
    
    - name: Update apt packages
      apt:
        update_cache: yes
        upgrade: dist
      when: ansible_os_family == "Debian"

    - name: Install required system packages
      package:
        name:
          - curl
          - wget
          - git
          - vim
          - htop
          - unzip
          - tar
          - python3
          - python3-pip
          - software-properties-common
          - apt-transport-https
          - ca-certificates
          - gnupg
          - lsb-release
        state: present

    - name: Create ghost user and group
      user:
        name: "{{ ghost_user }}"
        group: "{{ ghost_group }}"
        groups: docker
        shell: /bin/bash
        home: "{{ ghost_home }}"
        create_home: yes
        state: present

    - name: Create ghost directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ghost_user }}"
        group: "{{ ghost_group }}"
        mode: '0755'
      loop:
        - "{{ ghost_home }}"
        - "{{ ghost_home }}/data"
        - "{{ ghost_home }}/logs"
        - "{{ ghost_home }}/config"
        - "{{ ghost_home }}/ssl"
        - "{{ ghost_home }}/backups"

    - name: Install Docker
      block:
        - name: Add Docker GPG key
          apt_key:
            url: https://download.docker.com/linux/ubuntu/gpg
            state: present
          when: ansible_os_family == "Debian"

        - name: Add Docker repository
          apt_repository:
            repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
            state: present
          when: ansible_os_family == "Debian"

        - name: Install Docker packages
          package:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-buildx-plugin
              - docker-compose-plugin
            state: present

        - name: Start and enable Docker service
          service:
            name: docker
            state: started
            enabled: yes

    - name: Install Docker Compose
      get_url:
        url: "https://github.com/docker/compose/releases/download/{{ docker_compose_version }}/docker-compose-linux-x86_64"
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    - name: Install kubectl
      get_url:
        url: "https://dl.k8s.io/release/v{{ kubernetes_version }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'

    - name: Install Helm
      block:
        - name: Download Helm script
          get_url:
            url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
            dest: /tmp/get-helm.sh
            mode: '0755'

        - name: Install Helm
          command: /tmp/get-helm.sh
          creates: /usr/local/bin/helm

    - name: Setup firewall rules
      ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
      loop:
        - { port: 22, proto: tcp }
        - { port: 80, proto: tcp }
        - { port: 443, proto: tcp }
        - { port: 8000, proto: tcp }
        - { port: 8001, proto: tcp }
        - { port: 5432, proto: tcp }
        - { port: 6379, proto: tcp }
        - { port: 9090, proto: tcp }
        - { port: 3000, proto: tcp }

    - name: Enable firewall
      ufw:
        state: enabled
        policy: deny

    - name: Setup log rotation
      copy:
        dest: /etc/logrotate.d/ghost-cyber-universe
        content: |
          {{ ghost_home }}/logs/*.log {
            daily
            missingok
            rotate 30
            compress
            delaycompress
            notifempty
            create 644 {{ ghost_user }} {{ ghost_group }}
            postrotate
              docker kill -s USR1 $(docker ps -q --filter name=ghost-)
            endscript
          }

    - name: Create monitoring scripts
      copy:
        dest: "{{ ghost_home }}/scripts/health-check.sh"
        mode: '0755'
        content: |
          #!/bin/bash
          # Ghost Cyber Universe Health Check Script
          
          set -e
          
          LOG_FILE="{{ ghost_home }}/logs/health-check.log"
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
          
          log_message() {
            echo "[$TIMESTAMP] $1" >> $LOG_FILE
          }
          
          check_docker_containers() {
            log_message "Checking Docker containers..."
            
            containers=("ghost-c2-primary" "ghost-c2-secondary" "postgres" "redis" "nginx" "prometheus" "grafana")
            
            for container in "${containers[@]}"; do
              if docker ps --filter "name=$container" --format "table {{.Names}}" | grep -q "$container"; then
                log_message "$container is running"
              else
                log_message "$container is not running"
                exit 1
              fi
            done
          }
          
          check_services() {
            log_message "Checking service endpoints..."
            
            # Check C2 primary
            if curl -f -s http://localhost:8000/health > /dev/null; then
              log_message "C2 Primary API is healthy"
            else
              log_message "C2 Primary API is unhealthy"
              exit 1
            fi
            
            # Check C2 secondary
            if curl -f -s http://localhost:8001/health > /dev/null; then
              log_message "C2 Secondary API is healthy"
            else
              log_message "C2 Secondary API is unhealthy"
              exit 1
            fi
            
            # Check Nginx
            if curl -f -s http://localhost/ > /dev/null; then
              log_message "Nginx is healthy"
            else
              log_message "Nginx is unhealthy"
              exit 1
            fi
            
            # Check Prometheus
            if curl -f -s http://localhost:9090/-/healthy > /dev/null; then
              log_message "Prometheus is healthy"
            else
              log_message "Prometheus is unhealthy"
              exit 1
            fi
            
            # Check Grafana
            if curl -f -s http://localhost:3000/api/health > /dev/null; then
              log_message "Grafana is healthy"
            else
              log_message "Grafana is unhealthy"
              exit 1
            fi
          }
          
          check_disk_space() {
            log_message "Checking disk space..."
            
            DISK_USAGE=$(df / | tail -1 | awk '{print $5}' | sed 's/%//')
            
            if [ $DISK_USAGE -gt 80 ]; then
              log_message "Disk usage is high: ${DISK_USAGE}%"
            else
              log_message "Disk usage is normal: ${DISK_USAGE}%"
            fi
          }
          
          check_memory() {
            log_message "Checking memory usage..."
            
            MEMORY_USAGE=$(free | grep Mem | awk '{printf("%.0f"), $3/$2 * 100.0}')
            
            if [ $MEMORY_USAGE -gt 90 ]; then
              log_message "Memory usage is high: ${MEMORY_USAGE}%"
            else
              log_message "Memory usage is normal: ${MEMORY_USAGE}%"
            fi
          }
          
          main() {
            log_message "Starting Ghost Cyber Universe health check..."
            
            check_docker_containers
            check_services
            check_disk_space
            check_memory
            
            log_message "All health checks passed"
          }
          
          main "$@"

    - name: Create backup script
      copy:
        dest: "{{ ghost_home }}/scripts/backup.sh"
        mode: '0755'
        content: |
          #!/bin/bash
          # Ghost Cyber Universe Backup Script
          
          set -e
          
          BACKUP_DIR="{{ ghost_home }}/backups"
          TIMESTAMP=$(date '+%Y%m%d_%H%M%S')
          BACKUP_FILE="$BACKUP_DIR/ghost_backup_$TIMESTAMP.tar.gz"
          
          log_message() {
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] $1"
          }
          
          create_backup() {
            log_message "Starting backup process..."
            
            # Create backup directory if it doesn't exist
            mkdir -p $BACKUP_DIR
            
            # Backup PostgreSQL database
            log_message "Backing up PostgreSQL database..."
            docker exec ghost-postgres pg_dump -U {{ db_user }} {{ db_name }} > $BACKUP_DIR/postgres_$TIMESTAMP.sql
            
            # Backup Redis data
            log_message "Backing up Redis data..."
            docker exec ghost-redis redis-cli --rdb /data/dump_$TIMESTAMP.rdb
            docker cp ghost-redis:/data/dump_$TIMESTAMP.rdb $BACKUP_DIR/
            
            # Backup application data
            log_message "Backing up application data..."
            tar -czf $BACKUP_FILE \
              {{ ghost_home }}/data \
              {{ ghost_home }}/config \
              $BACKUP_DIR/postgres_$TIMESTAMP.sql \
              $BACKUP_DIR/dump_$TIMESTAMP.rdb
            
            # Cleanup temporary files
            rm -f $BACKUP_DIR/postgres_$TIMESTAMP.sql
            rm -f $BACKUP_DIR/dump_$TIMESTAMP.rdb
            
            log_message "Backup completed: $BACKUP_FILE"
          }
          
          cleanup_old_backups() {
            log_message "Cleaning up old backups (keeping last 7 days)..."
            find $BACKUP_DIR -name "ghost_backup_*.tar.gz" -mtime +7 -delete
          }
          
          main() {
            create_backup
            cleanup_old_backups
            log_message "Backup process completed successfully"
          }
          
          main "$@"

    - name: Setup cron jobs
      cron:
        name: "{{ item.name }}"
        job: "{{ item.job }}"
        minute: "{{ item.minute }}"
        hour: "{{ item.hour }}"
        user: "{{ ghost_user }}"
        state: present
      loop:
        - { name: "health-check", minute: "*/5", hour: "*", job: "{{ ghost_home }}/scripts/health-check.sh" }
        - { name: "daily-backup", minute: "0", hour: "2", job: "{{ ghost_home }}/scripts/backup.sh" }
        - { name: "log-rotation", minute: "0", hour: "1", job: "/usr/sbin/logrotate /etc/logrotate.d/ghost-cyber-universe" }

    - name: Copy Docker Compose configuration
      copy:
        src: ../../docker/docker-compose.prod.yml
        dest: "{{ ghost_home }}/docker-compose.yml"
        owner: "{{ ghost_user }}"
        group: "{{ ghost_group }}"
        mode: '0644'

    - name: Create environment file template
      copy:
        dest: "{{ ghost_home }}/.env.template"
        owner: "{{ ghost_user }}"
        group: "{{ ghost_group }}"
        mode: '0600'
        content: |
          # Ghost Cyber Universe Environment Variables
          # Copy this file to .env and update with your values
          
          # Database Configuration
          DB_HOST=postgres
          DB_PORT=5432
          DB_NAME=ghostdb
          DB_USER=ghost_admin
          DB_PASSWORD=your_secure_password_here
          
          # Redis Configuration
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_PASSWORD=your_redis_password_here
          
          # Security Configuration
          JWT_SECRET=your_jwt_secret_here
          API_KEY=your_api_key_here
          
          # Grafana Configuration
          GRAFANA_USER=admin
          GRAFANA_PASSWORD=your_grafana_password_here
          
          # SSL Configuration (if using HTTPS)
          SSL_CERT_PATH={{ ghost_home }}/ssl/cert.pem
          SSL_KEY_PATH={{ ghost_home }}/ssl/key.pem

    - name: Set proper permissions
      file:
        path: "{{ ghost_home }}"
        state: directory
        recurse: yes
        owner: "{{ ghost_user }}"
        group: "{{ ghost_group }}"
        mode: '0755'

    - name: Create systemd service for Ghost Cyber Universe
      copy:
        dest: /etc/systemd/system/ghost-cyber-universe.service
        content: |
          [Unit]
          Description=Ghost Cyber Universe Infrastructure
          Requires=docker.service
          After=docker.service
          
          [Service]
          Type=oneshot
          RemainAfterExit=yes
          WorkingDirectory={{ ghost_home }}
          ExecStart=/usr/local/bin/docker-compose up -d
          ExecStop=/usr/local/bin/docker-compose down
          TimeoutStartSec=0
          
          [Install]
          WantedBy=multi-user.target

    - name: Enable and start Ghost Cyber Universe service
      systemd:
        name: ghost-cyber-universe
        enabled: yes
        daemon_reload: yes

    - name: Display setup completion message
      debug:
        msg: |
          🎉 Ghost Cyber Universe infrastructure setup completed!
          
          Next steps:
          1. Copy {{ ghost_home }}/.env.template to {{ ghost_home }}/.env
          2. Update the environment variables in .env
          3. Run: cd {{ ghost_home }} && docker-compose up -d
          4. Check status: {{ ghost_home }}/scripts/health-check.sh
          
          Access URLs:
          - C2 Primary: http://localhost:8000
          - C2 Secondary: http://localhost:8001
          - Grafana: http://localhost:3000
          - Prometheus: http://localhost:9090
          - Kibana: http://localhost:5601
