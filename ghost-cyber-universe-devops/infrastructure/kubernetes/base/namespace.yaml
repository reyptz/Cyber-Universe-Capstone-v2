# Ghost Cyber Universe - Kubernetes Infrastructure
# DevOps Role - Kubernetes Configuration

apiVersion: v1
kind: Namespace
metadata:
  name: ghost-cyber-universe
  labels:
    name: ghost-cyber-universe
    environment: production
    team: devops
---
# Resource Quotas
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ghost-quota
  namespace: ghost-cyber-universe
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    persistentvolumeclaims: "10"
    pods: "50"
    services: "20"
    secrets: "20"
    configmaps: "20"
---
# Network Policies
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ghost-network-policy
  namespace: ghost-cyber-universe
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ghost-cyber-universe
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: ghost-cyber-universe
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
---
# Pod Security Policy
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: ghost-restricted-psp
  namespace: ghost-cyber-universe
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
    - ALL
  volumes:
    - 'configMap'
    - 'emptyDir'
    - 'projected'
    - 'secret'
    - 'downwardAPI'
    - 'persistentVolumeClaim'
  runAsUser:
    rule: 'MustRunAsNonRoot'
  seLinux:
    rule: 'RunAsAny'
  fsGroup:
    rule: 'RunAsAny'
---
# Limit Ranges
apiVersion: v1
kind: LimitRange
metadata:
  name: ghost-limits
  namespace: ghost-cyber-universe
spec:
  limits:
  - default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    type: Container
  - max:
      cpu: 2
      memory: 4Gi
    min:
      cpu: 50m
      memory: 64Mi
    type: Container
---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ghost-service-account
  namespace: ghost-cyber-universe
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/ghost-eks-role
---
# ConfigMap for Application Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: ghost-config
  namespace: ghost-cyber-universe
data:
  app.env: "production"
  log.level: "info"
  monitoring.enabled: "true"
  security.encryption: "enabled"
  performance.max_connections: "1000"
  performance.timeout: "30"
---
# Secret for Sensitive Data
apiVersion: v1
kind: Secret
metadata:
  name: ghost-secrets
  namespace: ghost-cyber-universe
type: Opaque
data:
  # Base64 encoded values
  db-password: <BASE64_ENCODED_PASSWORD>
  redis-password: <BASE64_ENCODED_REDIS_PASSWORD>
  jwt-secret: <BASE64_ENCODED_JWT_SECRET>
  api-key: <BASE64_ENCODED_API_KEY>
---
# Persistent Volume Claims
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ghost-data-pvc
  namespace: ghost-cyber-universe
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: ghost-ebs-gp3
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ghost-logs-pvc
  namespace: ghost-cyber-universe
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: ghost-ebs-gp3
---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ghost-api-hpa
  namespace: ghost-cyber-universe
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ghost-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
# Pod Disruption Budget
apiVersion: policy/v1beta1
kind: PodDisruptionBudget
metadata:
  name: ghost-api-pdb
  namespace: ghost-cyber-universe
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: ghost-api
---
# Service Monitor for Prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ghost-service-monitor
  namespace: ghost-cyber-universe
  labels:
    app: ghost-cyber-universe
spec:
  selector:
    matchLabels:
      app: ghost-api
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ghost-ingress
  namespace: ghost-cyber-universe
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
  - hosts:
    - ghostcyberuniverse.com
    - api.ghostcyberuniverse.com
    secretName: ghost-tls
  rules:
  - host: ghostcyberuniverse.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ghost-ui-service
            port:
              number: 80
  - host: api.ghostcyberuniverse.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ghost-api-service
            port:
              number: 8000
