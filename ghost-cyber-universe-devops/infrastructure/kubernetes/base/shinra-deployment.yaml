# Ghost Cyber Universe - Shinra Detection Engine
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shinra
  namespace: ghost-cyber-universe
  labels:
    app: shinra
    component: detection
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shinra
  template:
    metadata:
      labels:
        app: shinra
      annotations:
        security.ghost-cyber-universe.com/scan: "required"
    spec:
      containers:
      - name: shinra
        image: ghost-cyber-universe/shinra:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 9000
          name: api
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 9000
          initialDelaySeconds: 60
        readinessProbe:
          httpGet:
            path: /ready
            port: 9000
          initialDelaySeconds: 10
        securityContext:
          privileged: false
          capabilities:
            add: ["NET_ADMIN", "SYS_PTRACE"] # Required for detection
      serviceAccountName: ghost-app-sa
---
# Ghost Cyber Universe - Shinra Service
apiVersion: v1
kind: Service
metadata:
  name: shinra-service
  namespace: ghost-cyber-universe
  labels:
    app: shinra
spec:
  ports:
  - port: 9000
    targetPort: 9000
    protocol: TCP
  selector:
    app: shinra
