# Ghost Cyber Universe - Core Application Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghost-app
  namespace: ghost-cyber-universe
  labels:
    app: ghost-app
    component: backend
    tier: application
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ghost-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ghost-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
      - name: ghost-app
        image: ghost-cyber-universe/app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ghost-db-secrets
              key: url
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: ghost-config
              key: redis_url
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: ghost-app
            topologyKey: "kubernetes.io/hostname"
---
# Ghost Cyber Universe - Service
apiVersion: v1
kind: Service
metadata:
  name: ghost-app-service
  namespace: ghost-cyber-universe
  labels:
    app: ghost-app
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: ghost-app
