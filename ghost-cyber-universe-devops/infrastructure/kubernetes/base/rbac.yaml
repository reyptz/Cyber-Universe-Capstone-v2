# Ghost Cyber Universe - RBAC Configuration
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ghost-app-sa
  namespace: ghost-cyber-universe
  labels:
    app: ghost-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ghost-app-role
  namespace: ghost-cyber-universe
spec:
  rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ghost-app-role-binding
  namespace: ghost-cyber-universe
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ghost-app-role
subjects:
- kind: ServiceAccount
  name: ghost-app-sa
  namespace: ghost-cyber-universe
