# C2 High Availability Monitoring
# SRE Role - 99.9% uptime, <100ms alert latency

global:
  scrape_interval: 1s
  evaluation_interval: 1s

rule_files:
  - "c2-alerts.yml"

scrape_configs:
  - job_name: 'c2-servers'
    static_configs:
      - targets: 
        - 'c2-primary:8000'
        - 'c2-secondary:8000'
        - 'c2-tertiary:8000'
    metrics_path: '/metrics'
    scrape_interval: 1s
    scrape_timeout: 500ms

  - job_name: 'c2-health'
    static_configs:
      - targets: ['c2-lb:9100']
    metrics_path: '/health'
    scrape_interval: 500ms

  - job_name: 'ebpf-sensors'
    static_configs:
      - targets: ['ebpf-sensor:9091']
    scrape_interval: 100ms
    scrape_timeout: 50ms

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Recording rules for high-frequency metrics
recording_rules:
  - name: c2_performance
    rules:
      - record: c2:response_time:avg_5s
        expr: avg(rate(http_request_duration_seconds_sum[5s]) / rate(http_request_duration_seconds_count[5s]))
      
      - record: c2:error_rate:5s
        expr: sum(rate(http_requests_total{status=~"5.."}[5s])) / sum(rate(http_requests_total[5s])) * 100
      
      - record: ebpf:detection_latency:avg_100ms
        expr: avg(ebpf_detection_duration_seconds) * 1000
