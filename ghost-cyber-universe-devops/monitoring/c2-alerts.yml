# C2 High Availability Alerts
# SRE - Critical alerts with <100ms latency

groups:
  - name: c2_availability
    rules:
      - alert: C2Down
        expr: up{job="c2-servers"} == 0
        for: 5s
        labels:
          severity: critical
          service: c2
        annotations:
          summary: "C2 server {{ $labels.instance }} is down"
          description: "C2 server has been down for more than 5 seconds. Immediate action required."

      - alert: C2HighLatency
        expr: c2:response_time:avg_5s > 0.1
        for: 10s
        labels:
          severity: warning
          service: c2
        annotations:
          summary: "C2 high latency detected"
          description: "C2 response time is {{ $value }}s (threshold: 100ms)"

      - alert: C2HighErrorRate
        expr: c2:error_rate:5s > 5
        for: 15s
        labels:
          severity: critical
          service: c2
        annotations:
          summary: "C2 high error rate"
          description: "C2 error rate is {{ $value }}% (threshold: 5%)"

  - name: ebpf_detection
    rules:
      - alert: EBPFHighLatency
        expr: ebpf:detection_latency:avg_100ms > 150
        for: 5s
        labels:
          severity: warning
          service: ebpf
        annotations:
          summary: "eBPF detection high latency"
          description: "eBPF detection latency is {{ $value }}ms (threshold: 150ms)"

      - alert: EBPFEventQueueFull
        expr: ebpf_event_queue_usage > 90
        for: 2s
        labels:
          severity: critical
          service: ebpf
        annotations:
          summary: "eBPF event queue nearly full"
          description: "eBPF event queue is {{ $value }}% full. Risk of event loss."

  - name: infrastructure
    rules:
      - alert: C2ClusterUnhealthy
        expr: up{job="c2-servers"} == 0 or count(up{job="c2-servers"}) < 2
        for: 10s
        labels:
          severity: critical
          service: infrastructure
        annotations:
          summary: "C2 cluster unhealthy"
          description: "Less than 2 C2 servers are healthy. HA compromised."

      - alert: LoadBalancerFailover
        expr: haproxy_backend_status != 1
        for: 5s
        labels:
          severity: warning
          service: loadbalancer
        annotations:
          summary: "Load balancer failover detected"
          description: "Load balancer is in failover mode."

# Silence rules for maintenance
silences:
  - matchers:
      - name: alertname
        value: C2Down
    startsAt: "2024-01-01T00:00:00Z"
    endsAt: "2024-01-01T01:00:00Z"
    createdBy: "maintenance"
    comment: "Scheduled maintenance window"
